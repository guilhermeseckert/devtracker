<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Clock circle -->
  <circle cx="256" cy="240" r="130" fill="none" stroke="white" stroke-width="24" opacity="0.95"/>
  <!-- Clock hour hand -->
  <line x1="256" y1="240" x2="256" y2="160" stroke="white" stroke-width="20" stroke-linecap="round" opacity="0.95"/>
  <!-- Clock minute hand -->
  <line x1="256" y1="240" x2="320" y2="210" stroke="white" stroke-width="16" stroke-linecap="round" opacity="0.95"/>
  <!-- Clock center dot -->
  <circle cx="256" cy="240" r="12" fill="white" opacity="0.95"/>
  <!-- Code bracket left < -->
  <path d="M180 410 L140 430 L180 450" fill="none" stroke="white" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
  <!-- Code slash / -->
  <line x1="230" y1="405" x2="280" y2="455" stroke="white" stroke-width="16" stroke-linecap="round" opacity="0.8"/>
  <!-- Code bracket right > -->
  <line x1="330" y1="410" x2="370" y2="430" stroke="white" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
  <line x1="370" y1="430" x2="330" y2="450" stroke="white" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
</svg>
