name: Update Homebrew

on:
  release:
    types: [published]

jobs:
  update-tap:
    runs-on: ubuntu-latest
    steps:
      - name: Update Homebrew cask
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"

          git clone https://x-access-token:${GH_TOKEN}@github.com/guilhermeseckert/homebrew-tap.git
          cd homebrew-tap

          sed -i "s/version \".*\"/version \"${VERSION}\"/" Casks/devtracker.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/devtracker.rb
          git commit -m "Bump DevTracker to v${VERSION}" || exit 0
          git push
